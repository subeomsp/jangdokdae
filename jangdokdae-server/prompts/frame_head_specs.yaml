name: "frame_head_specs"
version: "1.0.0"
description: "frame(읽는 법)별 메타데이터 + 4-head 명세 (docs/design/08 §3, 10 §2). 호출 B user 프롬프트 조립에 사용."

# 각 frame: user_label(사용자 노출 한글), connection_hint(연결 모듈 구성 힌트), heads[4].
# head: label(노출 제목) · question(답할 질문) · guidance?(작성 지침) · misconception?(head3 오해 방지)
#       · global_label?(origin=해외일 때 label 교체)

frames:
  EARNINGS:
    user_label: "실적이 나왔어요"
    connection_hint: "이 기업과 같은 섹터의 연관·경쟁 기업을 함께 제시."
    heads:
      - label: "이번 실적, 핵심 숫자만"
        question: "가장 크게 좋아지거나 나빠진 숫자는 무엇이고, 그 변화를 만든 부문은 어디인가"
        guidance: "발표된 숫자의 핵심을 요약한다."
      - label: "시장은 이 정도를 기대했어요"
        question: "시장 예상(컨센서스)을 상회·하회했는가, 폭은 얼마인가"
      - label: "이 흐름, 이어질까요?"
        question: "이 변화는 일회성 요인인가, 구조적으로 이어질 수 있는가"
        misconception: "숫자가 좋으니 무조건 좋다고 보는 것. 예상 대비와 지속성으로 구분한다."
      - label: "앞으로 뭘 보면 될까요"
        question: "다음 발표(가이던스·차기 지표), 동종업체 숫자와 비교할 점"

  INCIDENT:
    user_label: "악재가 생겼어요"
    connection_hint: "직접 영향받는 기업과, 같은 섹터로 영향이 번질 수 있는 기업을 sentiment로 구분해 제시."
    heads:
      - label: "무슨 일이 있었냐면요"
        global_label: "무슨 일이 있었냐면요"
        question: "정확히 무슨 일이 일어났고, 확정된 사실과 미확정 사실은 무엇인가"
        guidance: "일어난 사건을 사실 위주로 쓴다."
      - label: "어디까지 영향을 줄까요?"
        global_label: "어디까지 영향을 줄까요?"
        question: "사업·재무에 미치는 영향의 범위와 크기는 어느 정도인가"
      - label: "한 번의 악재일까요?"
        question: "회복 가능한 일회성인가, 구조적으로 이어질 문제인가"
        misconception: "악재 규모를 과대·과소 평가하는 것. 확정 사실과 우려를 구분하고, '빠졌으니 팔아야 한다' 같은 단정을 차단한다."
      - label: "앞으로 뭘 보면 될까요"
        question: "회사(당사자) 공식 입장, 후속 공시·발표, 동종업체 영향"

  PLAN:
    user_label: "새 계획을 발표했어요"
    connection_hint: "이 기업과 직접 관련된 기업(공급·고객·경쟁)을 함께 제시."
    heads:
      - label: "새로 하겠다는 게 뭐예요?"
        question: "새 제품·기술·계약·투자·주주환원이 기존 대비 무엇이 구체적으로 달라졌는가"
        guidance: "약속의 내용을 요약한다. 배당·자사주 등 주주환원 발표도 '하겠다'는 약속으로 다룬다."
      - label: "매출로 이어질 수 있을까요?"
        question: "이 약속이 실제 매출·수익(또는 주주 몫)으로 연결되는 경로는 무엇인가"
      - label: "아직 남은 숙제가 있어요"
        question: "실현까지 남은 관문(인증·양산·공급계약·규제·이사회 결의·실행 일정)은 무엇인가"
        misconception: "발표가 곧 실적·주가 상승이라고 보는 것. 아직 약속(기대) 단계임을 분명히 구분한다."
      - label: "앞으로 뭘 보면 될까요"
        question: "실행 일정(양산·첫 매출 인식·배당 기준일), 후속 수주·발표 여부"

  POLICY:
    user_label: "제도가 바뀌어요"
    connection_hint: "이득 섹터와 부담 섹터로 나누고(sentiment 구분), 섹터마다 관련 기업 후보를 제시."
    heads:
      - label: "뭐가 바뀐다는 건가요"
        global_label: "뭐가 바뀐다는 건가요"
        question: "무엇이 어떻게 바뀌며, 확정인가 검토 단계인가, 시행 시점은 언제인가"
      - label: "누구에게 좋고, 누구에게 부담일까요?"
        global_label: "누구에게 좋고, 누구에게 부담일까요?"
        question: "이득을 보는 쪽과 부담을 지는 쪽은 어떤 성격의 산업·기업인가 — 기업명이 아니라 유형으로"
      - label: "정해진 건 맞나요?"
        question: "시장이 이미 선반영한 부분과 아직 확인 안 된 부분은 무엇인가"
        misconception: "검토 단계 정책을 확정된 것처럼 받아들이는 것."
      - label: "앞으로 뭘 보면 될까요"
        question: "시행 시점, 세부 시행령, 업계 대응"

  TREND:
    user_label: "업황이 달라져요"
    connection_hint: "영향받는 하위 섹터별로 나누고, 섹터마다 관련 기업 후보를 제시."
    heads:
      - label: "흐름이 바뀌고 있어요"
        question: "수요·공급·가격·점유율 중 무엇이 어떤 방향으로 변하고 있는가"
        guidance: "업황에서 일어난 변화를 요약한다."
      - label: "누구에게 좋고, 누구에게 부담일까요?"
        question: "유리해지는 쪽과 불리해지는 쪽은 어떤 성격의 기업인가 — 기업명이 아니라 유형으로"
      - label: "이 흐름, 이어질까요?"
        question: "단기 사이클인가, 구조적 변화인가"
        misconception: "일시적 가격·수요 변동을 구조적 변화로 착각하는 것."
      - label: "앞으로 뭘 보면 될까요"
        question: "가격 추이, 재고 수준, 경쟁사 생산능력 발표"

  OPINION:
    user_label: "전문가가 평가했어요"
    connection_hint: "리포트가 다룬 종목과, 같은 섹터에서 비교되는 경쟁 기업을 함께 제시. 운용사·증권사는 company_candidates에 넣지 않는다."
    heads:
      - label: "목표가가 나왔어요"
        question: "어느 증권사·애널리스트가 목표주가·투자의견을 어떻게(상향·하향·유지) 제시했고, 직전 대비 변화폭은 얼마인가"
        guidance: "첫 문장에 반드시 [종목명] + [목표가] + [투자의견] + [직전 대비 변화]를 박는다. 회사명 없이 'AI 부품 시장의 변화…'처럼 업황으로 시작하지 않는다 — 시선을 이 종목·이 숫자에 묶는다."
      - label: "지금 가격과 얼마나 다른가요?"
        question: "제시된 목표가가 현재 주가 대비 몇 % 높은(또는 낮은) 수준인가 — 괴리율을 명시한다"
        guidance: "[추가 자료]에 현재가가 주어지면 괴리율을 계산해 '목표가 △△원은 현재가 ○○원보다 □□% 높은/낮은 수준'처럼 쓴다. 현재가가 주어지지 않으면 '현재가 정보를 확인하지 못해 목표가의 높낮이를 판단하기 어렵습니다'라고 비운다 — 추정으로 채우지 않는다."
      - label: "이 숫자, 믿어도 될까요?"
        question: "그 목표가를 떠받치는 핵심 가정 한두 개는 무엇이고, 그게 맞아야 성립한다는 점을 어떻게 보여줄 것인가"
        misconception: "'목표가 = 미래 주가'라는 오해. 목표가는 특정 가정 위에 선 추정치임을 분명히 한다. 극단적 추정치(예: 186조원)는 단정으로 옮기지 말고 '애널리스트는 ~라고 가정하면 186조로 추정했습니다'처럼 가정의 산물임을 말투로 표시한다. 리포트를 산업 전체 분석으로 확대하지 말고 '이 종목'에 대한 평가로 좁혀 읽는다."
      - label: "앞으로 뭘 보면 될까요"
        question: "3단의 가정이 현실이 되는지 확인할 지표(양산 일정·수주·ASP·다음 실적 등)는 무엇인가 — 양방향으로"
        guidance: "'양산이 계획대로면 매출 증대, 지연이면 전망치 재평가'처럼 지표가 어느 방향이면 무슨 의미인지 양방향으로 쓴다."

  PRICE:
    user_label: "주가만 움직였어요"
    connection_hint: "주인공이 시장 전체면 그날 주도 섹터·종목. 발생지가 해외면 국내 영향이 예상되는 섹터·종목. 주인공이 회사면 동반 움직인 같은 섹터 기업."
    heads:
      - label: "주가가 움직였어요"
        global_label: "주가가 움직였어요"
        question: "무엇이 얼마나 움직였고, 같은 섹터가 함께 움직였는가"
      - label: "왜 움직였대요"
        global_label: "왜 움직였대요"
        question: "기사가 제시한 원인은 무엇인가"
      - label: "진짜 변화가 있었나요"
        question: "그 원인은 실제 실적·사업 변화로 확인된 것인가, 사후 해석인가"
        misconception: "기사가 붙인 사후 해석을 확정된 원인으로 받아들이는 것. 급등이면 '따라 사야 한다', 급락이면 '따라 팔아야 한다'는 단정도 함께 차단한다."
      - label: "앞으로 뭘 보면 될까요"
        question: "다음 거래일 흐름, 실적·사업 뉴스가 함께 나오는지"
