# 수집 제외 필터 (정본) — 비기사성 뉴스를 수집 단계에서 거르는 규칙.
#
# 로더: services/collector/news_filter.py. 새 카테고리 추가는 이 파일만 고치면 되고
# 코드 배포가 필요 없다(news_feeds.yaml·news_body.yaml과 동일 원칙).
#
# 판정:
#   excluded_title_keywords : 제목 맨 앞 '괄호 태그'의 안쪽 키워드와 정확히 일치하면 제외.
#     괄호 종류는 [ ] ( ) < > 【 】 （ ）를 모두 허용하고 내부 공백은 무시한다 — "<부고>"·
#     "【부고】"·"[AI 카드뉴스]"가 모두 매칭된다(비교는 공백 제거·소문자화 후 수행).
#     ⚠️ 정상 기사 태그([단독]·[종합]·[속보]·[특징주] 등)는 절대 넣지 말 것 — 오탐 위험.
#   excluded_body_markers   : 제목/요약에 이 문구가 포함되면 제외(AI 자동요약 카드 등).

excluded_title_keywords:
  - 부고            # 부고(訃告)
  - 부음
  - 인사            # 인사발령
  - 동정            # 인물 동정
  - 포토
  - 사진
  - 화보
  - 영상
  - 카드뉴스
  - AI 카드뉴스
  - 인포그래픽
  - 그래픽
  - 표              

excluded_body_markers:
  - AI가 자동 생성한 요약으로 정확하지 않을 수 있어요
  - 엠블록레터의 AI 인턴   # 기사 전체가 AI 생성물인 엠블록레터 칼럼(매경) — RSS 요약이 AI 인턴 인사말로 시작
