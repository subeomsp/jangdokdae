# 뉴스 본문 정제 설정 (정본) — 임베딩 입력용 본문 클리닝 규칙.
#
# 본문은 trafilatura가 추출·1차 정제한 평문이다(services/analyzer/article_fetcher).
# trafilatura가 대부분의 보일러플레이트를 걷어내지만, 한국 언론 특유의 꼬리말
# (저작권 고지·기자 서명·구독/앱 안내 등)은 본문에 남는 경우가 많다.
# 아래 정규식에 매치되는 "줄"을 제거한다(줄 단위, 대소문자 무시·MULTILINE은 로더가 처리).
#
# 추가·수정은 이 파일만 고치면 된다(코드 배포 불필요). 로더: services/preprocessor/body_processor.py
# 청크 크기·overlap 등 스칼라 파라미터는 app/config.py(env)에 있다(bake-off 스윕 대상).

# 바이라인 prefix — 줄 전체를 지우지 않고 매치 부분(앞머리)만 제거해 리드 문단 본문은 보존한다.
# 예: "(서울=연합인포맥스) 노요빈 기자 = 국내 증시가..." → "국내 증시가..."
byline_patterns:
  - "^[(\\[][^)\\]]*[)\\]]\\s*[가-힣]{2,5}\\s*기자\\s*=\\s*"  # (지역=언론사) 이름 기자 =
  - "^\\[[^\\]]*기자\\]\\s*"  # [언론사 (지역) 이름 기자] — 기자가 대괄호 안 (서울파이낸스·뉴스토마토 등)

# 블록 제거 — start~end 마커 사이를 통째로 제거한다(AI 자동요약 위젯처럼 줄 단위로 못 지우는 영역).
# end를 max_lines 안에서 못 찾으면 본문 오삭제를 막기 위해 제거하지 않는다(안전장치).
boilerplate_blocks:
  # AI 자동요약 위젯(뉴스핌 등): "AI 핵심 요약" ~ "!AI가 자동 생성한 요약..." 면책 줄까지
  - { start: "^AI 핵심 요약", end: "AI가 자동 생성한 요약", max_lines: 8 }

boilerplate_patterns:
  - "무단\\s*전재"                       # "무단전재 및 재배포 금지"
  - "재\\s*배포\\s*금지"
  - "저작권자?\\s*(?:[ⓒ©]|\\(c\\))"       # "저작권자 ⓒ ..." / "저작권자(c)" — (c)는 리터럴 토큰
  - "[ⓒ©]\\s*\\S*(닷컴|뉴스|일보|경제|미디어|타임스)"  # "ⓒ 한국경제"
  - "[\\w.+-]+@[\\w-]+\\.[\\w.-]+\\s*$"   # 줄 끝 기자 이메일 서명(본문 인라인 이메일은 보존)
  - "^\\s*\\S{2,4}\\s*기자\\s*$"          # "홍길동 기자" 단독 줄
  - "구독\\s*(하기|신청)"                 # 뉴스레터·구독 안내
  - "기자\\s*구독"                       # "기자구독" 버튼(이데일리 등 UI 잔재)
  - "앱\\s*다운로드"
  - "^입력\\s*20\\d{2}"                  # "입력2026-06-19 14:39" 작성시각 줄
  - "^이 기사를 추천합니다"              # 추천 버튼 텍스트
  - "^[\\s|]*\\|[\\s|]*$"                # "| " 표 잔재(빈 표 행)
  - "^\\[[^\\]]{1,20}\\]\\s*$"           # 단독 대괄호 태그(예: [파이낸셜뉴스])
  - "^Key Points\\s*$"                   # AI 요약 헤더(매일경제 등)
  - "^-\\s*$"                            # 빈 불릿 구분선("- ")
  - "^기사\\s*스크랩$"                   # 한국경제 등 기사 액션 메뉴
  - "^댓글$"
  - "^공유$"
  - "^글자\\s*크기$"
  - "^프린트$"
  - "Google 검색에서"                    # "Google 검색에서 ~ 기사를 더 자주 볼 수 있습니다" 안내
  - "AI가 자동 생성한 요약으로 정확하지"  # 진짜 기사 위에 붙는 AI 요약 위젯 면책 줄(뉴스핌 등)
  - "증권정보\\s+\\d+\\s+KOS"             # 시세 위젯 줄(아시아경제): "…close 증권정보 179530 KOSDAQ 현재가…관련기사…"
