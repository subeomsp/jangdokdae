# RSS 피드 레지스트리 (정본) — 수집 대상 피드 목록.
#
# 컬럼:
#   rss_source : 피드 식별자(고유). news.rss_source에 저장. 예: hankyung_finance
#   publisher  : 언론사 표시명. 기사에 <source>가 없을 때 news_source 폴백
#   url        : RSS 엔드포인트
#   region     : 권역(korea/us/global, 선택) — 분류·필터용 메타. 미지정 시 korea
#   tz         : 오프셋 없는 발행시각 해석 기준 타임존. 국내 섹션 피드는 Asia/Seoul
#   active     : false면 폴링 제외(비활성화도 코드 변경 없이 이 값만 토글)
#

